<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>2048</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#1a1108;display:flex;flex-direction:column;
    align-items:center;justify-content:center;height:100vh;
    overflow:hidden;font-family:'Helvetica Neue',Arial,sans-serif;
    touch-action:none;
  }
  #header{display:flex;align-items:center;gap:24px;margin-bottom:16px;}
  h1{color:#f59563;font-size:40px;font-weight:900;letter-spacing:-1px;}
  .score-box{background:rgba(255,255,255,0.08);border-radius:8px;
    padding:6px 16px;text-align:center;min-width:70px;}
  .score-box .lbl{color:rgba(255,255,255,0.4);font-size:10px;font-weight:700;text-transform:uppercase;}
  .score-box .val{color:white;font-size:20px;font-weight:700;}
  button.new-game{
    background:rgba(255,255,255,0.12);border:none;color:white;
    padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;
    cursor:pointer;letter-spacing:.05em;transition:background .15s;
  }
  button.new-game:hover{background:rgba(255,255,255,0.2);}
  #grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
    background:#3a2f1e;border-radius:10px;padding:10px;
    width:min(90vw,380px);aspect-ratio:1;
  }
  .cell{
    border-radius:6px;display:flex;align-items:center;justify-content:center;
    font-weight:900;transition:background .12s;
    background:#2a1f10;color:transparent;font-size:0;
  }
  .cell[data-v]{color:var(--tc);font-size:var(--fs);background:var(--bg);}
  .cell.new-tile{animation:pop .15s cubic-bezier(.175,.885,.32,1.275);}
  @keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
  #msg{
    position:fixed;inset:0;background:rgba(0,0,0,0.7);
    display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
  }
  #msg h2{color:white;font-size:28px;}
  #msg p{color:rgba(255,255,255,0.5);}
  #msg button{background:#f59563;border:none;color:white;padding:10px 28px;
    border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
  #msg button:hover{filter:brightness(1.15);}
</style>
</head>
<body>
<div id="header">
  <h1>2048</h1>
  <div class="score-box"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
  <div class="score-box"><div class="lbl">Best</div><div class="val" id="best">0</div></div>
  <button class="new-game" id="new-btn">Neu</button>
</div>
<div id="grid"></div>
<div id="msg">
  <h2 id="msg-title">Game Over!</h2>
  <p id="msg-sub">Keine Züge mehr möglich.</p>
  <button id="msg-btn">Nochmal</button>
</div>

<script>
const TILE_STYLE={
  2:   {bg:'#eee4da',tc:'#776e65',fs:'28px'},
  4:   {bg:'#ede0c8',tc:'#776e65',fs:'28px'},
  8:   {bg:'#f2b179',tc:'#f9f6f2',fs:'28px'},
  16:  {bg:'#f59563',tc:'#f9f6f2',fs:'26px'},
  32:  {bg:'#f67c5f',tc:'#f9f6f2',fs:'26px'},
  64:  {bg:'#f65e3b',tc:'#f9f6f2',fs:'26px'},
  128: {bg:'#edcf72',tc:'#f9f6f2',fs:'22px'},
  256: {bg:'#edcc61',tc:'#f9f6f2',fs:'22px'},
  512: {bg:'#edc850',tc:'#f9f6f2',fs:'22px'},
  1024:{bg:'#edc53f',tc:'#f9f6f2',fs:'18px'},
  2048:{bg:'#edc22e',tc:'#f9f6f2',fs:'18px'},
};

let board,score,best=+localStorage.getItem('2048_best')||0,newTiles;
document.getElementById('best').textContent=best;

function init(){
  board=Array.from({length:4},()=>Array(4).fill(0));
  score=0;newTiles=new Set();
  add(); add(); render();
  document.getElementById('score').textContent=0;
  document.getElementById('msg').style.display='none';
}

function add(){
  const empty=[];
  board.forEach((r,i)=>r.forEach((v,j)=>{if(!v)empty.push([i,j]);}));
  if(!empty.length)return;
  const [i,j]=empty[Math.floor(Math.random()*empty.length)];
  board[i][j]=Math.random()<0.9?2:4;
  newTiles.add(i*4+j);
}

function render(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  board.forEach((row,i)=>row.forEach((v,j)=>{
    const cell=document.createElement('div');
    cell.className='cell'+(newTiles.has(i*4+j)?' new-tile':'');
    if(v){
      const s=TILE_STYLE[v]||{bg:'#3c3a32',tc:'#f9f6f2',fs:'16px'};
      cell.setAttribute('data-v',v);
      cell.style.setProperty('--bg',s.bg);
      cell.style.setProperty('--tc',s.tc);
      cell.style.setProperty('--fs',s.fs);
      cell.textContent=v;
    }
    g.appendChild(cell);
  }));
  newTiles.clear();
}

function slide(row){
  let r=row.filter(v=>v);
  for(let i=0;i<r.length-1;i++){
    if(r[i]===r[i+1]){r[i]*=2;score+=r[i];r.splice(i+1,1);}
  }
  while(r.length<4)r.push(0);
  return r;
}

function move(dir){
  let moved=false;
  const old=JSON.stringify(board);
  if(dir==='left' ||dir==='right'){
    board=board.map(row=>{const s=dir==='left'?slide(row):slide([...row].reverse()).reverse();return s;});
  } else {
    for(let c=0;c<4;c++){
      let col=board.map(r=>r[c]);
      const s=dir==='up'?slide(col):slide([...col].reverse()).reverse();
      s.forEach((v,i)=>board[i][c]=v);
    }
  }
  if(JSON.stringify(board)!==old){moved=true;add();}
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('2048_best',best);document.getElementById('best').textContent=best;}
  render();
  if(moved) checkEnd();
}

function checkEnd(){
  if(board.some(r=>r.includes(2048))){win();return;}
  for(let i=0;i<4;i++)for(let j=0;j<4;j++){
    if(!board[i][j])return;
    if(j<3&&board[i][j]===board[i][j+1])return;
    if(i<3&&board[i][j]===board[i+1][j])return;
  }
  gameOver();
}

function win(){
  document.getElementById('msg-title').textContent='🎉 Gewonnen!';
  document.getElementById('msg-sub').textContent='Du hast 2048 erreicht!';
  document.getElementById('msg').style.display='flex';
}
function gameOver(){
  document.getElementById('msg-title').textContent='Game Over!';
  document.getElementById('msg-sub').textContent='Keine Züge mehr möglich.';
  document.getElementById('msg').style.display='flex';
}

// Keyboard
document.addEventListener('keydown',e=>{
  const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
           a:'left',d:'right',w:'up',s:'down'};
  if(m[e.key]){e.preventDefault();move(m[e.key]);}
});

// Touch swipe
let tx0,ty0;
document.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

document.getElementById('new-btn').addEventListener('click',init);
document.getElementById('msg-btn').addEventListener('click',init);
init();
</script>
</body>
</html>
